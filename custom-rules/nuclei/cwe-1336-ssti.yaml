id: cwe-1336-ssti-detection
info:
  name: Server-Side Template Injection (SSTI)
  author: security-all-in-one
  severity: critical
  description: Tests for SSTI across multiple template engines
  classification:
    cwe-id: CWE-1336
    cvss-score: 9.8
  tags: ssti,cwe-1336,dast,bug-bounty

http:
  - method: GET
    path:
      - "{{BaseURL}}/?name={{url_encode('{{7*191}}')}}"
      - "{{BaseURL}}/?template={{url_encode('${7*191}')}}"
      - "{{BaseURL}}/?page={{url_encode('<%= 7*191 %>')}}"
      - "{{BaseURL}}/?q={{url_encode('#{7*191}')}}"
      - "{{BaseURL}}/?search={{url_encode('{7*191}')}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "1337"

      - type: status
        status:
          - 200

      - type: word
        part: body
        negative: true
        words:
          - "cf_chl"
          - "challenge-platform"
