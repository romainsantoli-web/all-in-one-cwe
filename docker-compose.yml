# ⚠️ Contenu généré par IA — validation humaine requise avant utilisation.
# Security All-in-One CWE — Docker Compose
# Usage: docker compose up <service> ou ./runner.sh <target>
# Couvre 95+ CWE via 15 outils intégrés.

x-common: &common
  restart: "no"

services:
  # ============================================================
  # 1. DAST — Nuclei (11 000+ templates)
  # Couvre: CWE-79,89,78,918,611,22,639,352,601,444,113,1336,
  #         90,94,91,99,1021,284,287,200,215,209,548,400,644,
  #         93,307,425,434,942,524,349,1022,613,640,620,1236,
  #         300,312,319,311,522,523,922,532,326,327,328,330,338,
  #         321,259,798,257,256,260,261,325,323,324,295,296,657
  # ============================================================
  nuclei:
    <<: *common
    image: projectdiscovery/nuclei:latest
    volumes:
      - ./reports/nuclei:/output
      - ./custom-rules/nuclei:/custom-templates:ro
      - ./configs/nuclei-config.yaml:/root/.config/nuclei/config.yaml:ro
    entrypoint: ["nuclei"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"
      - "-t"
      - "/custom-templates/"
      - "-severity"
      - "info,low,medium,high,critical"
      - "-jsonl"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.jsonl"
      - "-rate-limit"
      - "${RATE_LIMIT:-50}"
      - "-bulk-size"
      - "25"
      - "-concurrency"
      - "10"
      - "-stats"

  # Nuclei with default templates (full coverage)
  nuclei-full:
    <<: *common
    image: projectdiscovery/nuclei:latest
    volumes:
      - ./reports/nuclei:/output
      - ./custom-rules/nuclei:/custom-templates:ro
    entrypoint: ["nuclei"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"
      - "-severity"
      - "info,low,medium,high,critical"
      - "-jsonl"
      - "-o"
      - "/output/full-scan-${SCAN_DATE:-latest}.jsonl"
      - "-rate-limit"
      - "${RATE_LIMIT:-50}"
      - "-stats"
    profiles: ["full"]

  # Nuclei subdomain scan (scan list of subdomains)
  nuclei-subs:
    <<: *common
    image: projectdiscovery/nuclei:latest
    volumes:
      - ./reports/nuclei:/output
      - ./reports/subdominator:/targets:ro
      - ./custom-rules/nuclei:/custom-templates:ro
    entrypoint: ["nuclei"]
    command:
      - "-l"
      - "/targets/high-value-targets.txt"
      - "-t"
      - "/custom-templates/"
      - "-severity"
      - "info,low,medium,high,critical"
      - "-jsonl"
      - "-o"
      - "/output/subs-scan-${SCAN_DATE:-latest}.jsonl"
      - "-rate-limit"
      - "${RATE_LIMIT:-30}"
      - "-bulk-size"
      - "10"
      - "-concurrency"
      - "5"
      - "-timeout"
      - "5"
      - "-retries"
      - "1"
      - "-stats"
      - "-stats-interval"
      - "10"
    profiles: ["subs"]

  # ============================================================
  # 2. DAST — OWASP ZAP (scanner interactif + automation)
  # Couvre: CWE-79,89,78,22,352,601,611,1021,93,200,209,215,
  #         548,284,287,307,434,613,640,620,400,644,942,524,319
  # ============================================================
  zap:
    <<: *common
    image: ghcr.io/zaproxy/zaproxy:stable
    volumes:
      - ./reports/zap:/zap/wrk
      - ./configs/zap-config.yaml:/zap/wrk/zap-config.yaml:ro
    entrypoint: ["zap.sh"]
    command:
      - "-cmd"
      - "-autorun"
      - "/zap/wrk/zap-config.yaml"

  zap-baseline:
    <<: *common
    image: ghcr.io/zaproxy/zaproxy:stable
    volumes:
      - ./reports/zap:/zap/wrk
    entrypoint: ["zap-baseline.py"]
    command:
      - "-t"
      - "${TARGET:-https://example.com}"
      - "-J"
      - "baseline-${SCAN_DATE:-latest}.json"
      - "-r"
      - "baseline-${SCAN_DATE:-latest}.html"

  zap-full:
    <<: *common
    image: ghcr.io/zaproxy/zaproxy:stable
    volumes:
      - ./reports/zap:/zap/wrk
    entrypoint: ["zap-full-scan.py"]
    command:
      - "-t"
      - "${TARGET:-https://example.com}"
      - "-J"
      - "full-${SCAN_DATE:-latest}.json"
      - "-r"
      - "full-${SCAN_DATE:-latest}.html"
      - "-a"
    profiles: ["full"]

  zap-gui:
    image: ghcr.io/zaproxy/zaproxy:stable
    ports:
      - "8080:8080"
      - "8090:8090"
    volumes:
      - ./reports/zap:/zap/wrk
    entrypoint: ["zap.sh"]
    command: ["-daemon", "-host", "0.0.0.0", "-port", "8080"]
    profiles: ["gui"]

  # ============================================================
  # 3. DAST — SQLMap (spécialiste SQL Injection CWE-89)
  # ============================================================
  sqlmap:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install --no-cache-dir sqlmap
        WORKDIR /app
    volumes:
      - ./reports/sqlmap:/output
    entrypoint: ["sqlmap"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"
      - "--batch"
      - "--level=3"
      - "--risk=2"
      - "--output-dir=/output"
      - "--forms"
      - "--crawl=2"
      - "--threads=4"
      - "--tamper=space2comment,between"

  # ============================================================
  # 4. DAST — SSTImap (SSTI/CSTI - CWE-1336)
  # ============================================================
  sstimap:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y --no-install-recommends git && \
            git clone --depth 1 https://github.com/vladko312/SSTImap.git /opt/sstimap && \
            pip install --no-cache-dir -r /opt/sstimap/requirements.txt && \
            apt-get purge -y git && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*
        WORKDIR /opt/sstimap
    volumes:
      - ./reports/sstimap:/output
    entrypoint: ["python", "/opt/sstimap/sstimap.py"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"

  # ============================================================
  # 5. DNS — dnsReaper (subdomain takeover CWE-16)
  # ============================================================
  dnsreaper:
    <<: *common
    image: punksecurity/dnsreaper:latest
    volumes:
      - ./reports/dnsreaper:/output
    command:
      - "single"
      - "--domain"
      - "${DOMAIN:-example.com}"
      - "--out"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "--out-format"
      - "json"

  # ============================================================
  # 6. DNS — Subdominator (subdomain takeover CWE-16)
  # ============================================================
  subdominator:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y --no-install-recommends \
              libglib2.0-0 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2 libffi-dev shared-mime-info && \
            pip install --no-cache-dir subdominator && \
            apt-get clean && rm -rf /var/lib/apt/lists/*
        WORKDIR /app
    volumes:
      - ./reports/subdominator:/output
    entrypoint: ["subdominator"]
    command:
      - "-d"
      - "${DOMAIN:-example.com}"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.txt"

  # ============================================================
  # 7. SAST — Semgrep (analyse statique polyvalente)
  # Couvre: CWE-89,78,79,94,327,295,502,312,319,311,798,259,
  #         256,260,321,522,338,330,326,328,134,1336,90,91,352,
  #         918,22,611,400,284,287,613,640,1427
  # ============================================================
  semgrep:
    <<: *common
    image: semgrep/semgrep:latest
    volumes:
      - ./reports/semgrep:/output
      - ./custom-rules/semgrep:/rules:ro
      - ${CODE:-./tools}:/src:ro
    working_dir: /src
    entrypoint: ["semgrep"]
    command:
      - "scan"
      - "--config=auto"
      - "--config=/rules/"
      - "--json"
      - "--output=/output/scan-${SCAN_DATE:-latest}.json"
      - "--severity=INFO"
      - "--max-target-bytes=5000000"
      - "/src"

  # ============================================================
  # 8. Secrets — Gitleaks (rapide, CWE-798,259,256,260,321,312)
  # ============================================================
  gitleaks:
    <<: *common
    image: ghcr.io/gitleaks/gitleaks:latest
    volumes:
      - ./reports/gitleaks:/output
      - ./configs/gitleaks.toml:/config/gitleaks.toml:ro
      - ${REPO:-./tools}:/src:ro
    entrypoint: ["gitleaks"]
    command:
      - "detect"
      - "--source=/src"
      - "--report-path=/output/scan-${SCAN_DATE:-latest}.json"
      - "--report-format=json"
      - "--config=/config/gitleaks.toml"
      - "-v"

  # ============================================================
  # 9. Secrets — TruffleHog (exhaustif, CWE-798,259,256,321,312,522)
  # ============================================================
  trufflehog:
    <<: *common
    image: trufflesecurity/trufflehog:latest
    volumes:
      - ./reports/trufflehog:/output
      - ${REPO:-./tools}:/src:ro
    entrypoint: ["trufflehog"]
    command:
      - "filesystem"
      - "--directory=/src"
      - "--json"
      - "--only-verified"

  # ============================================================
  # 10. SCA — Trivy (containers + code + secrets + misconfigs)
  # Couvre: CWE-1395,16,312,319,798,259,256,327,326,295,502
  # ============================================================
  trivy:
    <<: *common
    image: ghcr.io/aquasecurity/trivy:latest
    volumes:
      - ./reports/trivy:/output
      - ${CODE:-./tools}:/src:ro
      - trivy-cache:/root/.cache/trivy
    entrypoint: ["trivy"]
    command:
      - "fs"
      - "--format=json"
      - "--output=/output/scan-${SCAN_DATE:-latest}.json"
      - "--severity=LOW,MEDIUM,HIGH,CRITICAL"
      - "--scanners=vuln,secret,misconfig"
      - "/src"

  trivy-image:
    <<: *common
    image: ghcr.io/aquasecurity/trivy:latest
    volumes:
      - ./reports/trivy:/output
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - trivy-cache:/root/.cache/trivy
    entrypoint: ["trivy"]
    command:
      - "image"
      - "--format=json"
      - "--output=/output/image-scan-${SCAN_DATE:-latest}.json"
      - "--severity=LOW,MEDIUM,HIGH,CRITICAL"
      - "${IMAGE:-alpine:latest}"
    profiles: ["image"]

  # ============================================================
  # 11. SCA — OWASP Dependency-Check
  # Couvre: CWE-1395 (composants vulnérables)
  # ============================================================
  dependency-check:
    <<: *common
    image: owasp/dependency-check:latest
    volumes:
      - ./reports/dependency-check:/output
      - ${CODE:-./tools}:/src:ro
      - dependency-check-data:/usr/share/dependency-check/data
    entrypoint: ["/usr/share/dependency-check/bin/dependency-check.sh"]
    command:
      - "--project"
      - "bug-bounty-scan"
      - "--scan"
      - "/src"
      - "--format"
      - "JSON"
      - "--out"
      - "/output"
      - "--enableExperimental"

  # ============================================================
  # 12. Binary — cwe_checker (CWE pour binaires ELF/PE)
  # Couvre: CWE-120,121,122,124,125,126,127,128,129,131,134,
  #         170,190,191,193,415,416,476,843,123
  # ============================================================
  cwe-checker:
    <<: *common
    platform: linux/amd64
    image: fkiecad/cwe_checker:latest
    volumes:
      - ./reports/cwe-checker:/output
      - ${BIN:-/dev/null}:/input/binary:ro
    entrypoint: ["cwe_checker"]
    command:
      - "/input/binary"
      - "--json"
      - "--out=/output/scan-${SCAN_DATE:-latest}.json"

  # ============================================================
  # 13. Binary — cve-bin-tool (CVE dans binaires/SBOMs)
  # Couvre: CWE-1395 + composants connus vulnérables
  # ============================================================
  cve-bin-tool:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install --no-cache-dir cve-bin-tool
        WORKDIR /app
    volumes:
      - ./reports/cve-bin-tool:/output
      - ${BIN_DIR:-./tools}:/input:ro
    entrypoint: ["cve-bin-tool"]
    command:
      - "/input"
      - "--format"
      - "json"
      - "--output-file"
      - "/output/scan-${SCAN_DATE:-latest}.json"

  # ============================================================
  # 14. LLM — garak (scanner prompt injection CWE-1427)
  # ============================================================
  garak:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y --no-install-recommends gcc cargo rustc && \
            pip install --no-cache-dir garak && \
            apt-get purge -y gcc cargo rustc && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*
        WORKDIR /app
    volumes:
      - ./reports/garak:/output
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    entrypoint: ["python", "-m", "garak"]
    command:
      - "--model_type"
      - "${LLM_TYPE:-openai}"
      - "--model_name"
      - "${LLM_MODEL:-gpt-3.5-turbo}"
      - "--probes"
      - "promptinject,dan,encoding,gcg,knownbadsignatures"
      - "--report_prefix"
      - "/output/scan-${SCAN_DATE:-latest}"

  # ============================================================
  # 15. Recon — httpx (HTTP probing, tech detection)
  # Couvre: CWE-200 (information exposure), reconnaissance
  # ============================================================
  httpx:
    <<: *common
    image: projectdiscovery/httpx:latest
    volumes:
      - ./reports/httpx:/output
      - ./reports/subdominator:/targets:ro
    entrypoint: ["httpx"]
    command:
      - "-l"
      - "/targets/scan-${SCAN_DATE:-latest}.txt"
      - "-sc"
      - "-td"
      - "-title"
      - "-server"
      - "-ct"
      - "-location"
      - "-favicon"
      - "-jarm"
      - "-json"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "-rate-limit"
      - "${RATE_LIMIT:-50}"
      - "-threads"
      - "25"
    profiles: ["recon"]

  # ============================================================
  # 16. Recon — subfinder (passive subdomain enumeration)
  # Couvre: Reconnaissance passive multi-source (40+ providers)
  # ============================================================
  subfinder:
    <<: *common
    image: projectdiscovery/subfinder:latest
    volumes:
      - ./reports/subfinder:/output
    entrypoint: ["subfinder"]
    command:
      - "-d"
      - "${DOMAIN:-example.com}"
      - "-all"
      - "-json"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"

  # ============================================================
  # 17. Recon — naabu (port scanning)
  # Couvre: CWE-200,16 (service exposure, misconfig)
  # ============================================================
  naabu:
    <<: *common
    image: projectdiscovery/naabu:latest
    volumes:
      - ./reports/naabu:/output
      - ./reports/subdominator:/targets:ro
    entrypoint: ["naabu"]
    command:
      - "-list"
      - "/targets/high-value-targets.txt"
      - "-top-ports"
      - "1000"
      - "-json"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "-rate"
      - "${RATE_LIMIT:-50}"
      - "-silent"
    profiles: ["recon"]

  # ============================================================
  # 18. Recon — katana (web crawler / spider JS-aware)
  # Couvre: CWE-200 (endpoint discovery, JS analysis)
  # ============================================================
  katana:
    <<: *common
    image: projectdiscovery/katana:latest
    volumes:
      - ./reports/katana:/output
    entrypoint: ["katana"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"
      - "-d"
      - "3"
      - "-jc"
      - "-kf"
      - "all"
      - "-ef"
      - "css,png,jpg,gif,svg,woff,woff2,ico"
      - "-json"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "-rate-limit"
      - "${RATE_LIMIT:-50}"
      - "-concurrency"
      - "10"
    profiles: ["recon"]

  # ============================================================
  # 19. Fuzzing — ffuf (directory / parameter fuzzing)
  # Couvre: CWE-200,538,548 (hidden endpoints, directory listing)
  # ============================================================
  ffuf:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.22-alpine AS build
        RUN go install github.com/ffuf/ffuf/v2@latest
        FROM alpine:3.20
        COPY --from=build /go/bin/ffuf /usr/local/bin/ffuf
        ENTRYPOINT ["ffuf"]
    volumes:
      - ./reports/ffuf:/output
      - ./wordlists:/wordlists:ro
    entrypoint: ["ffuf"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}/FUZZ"
      - "-w"
      - "/wordlists/dirs.txt"
      - "-mc"
      - "200,201,202,204,301,302,307,401,403,405,500"
      - "-fc"
      - "429"
      - "-rate"
      - "${RATE_LIMIT:-50}"
      - "-json"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "-t"
      - "10"
    profiles: ["fuzz"]

  # ============================================================
  # 20. Fuzzing — feroxbuster (recursive directory brute-force)
  # Couvre: CWE-200,538,548 (hidden endpoints, forced browsing)
  # ============================================================
  feroxbuster:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM rust:latest AS build
        RUN apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev && \
            cargo install feroxbuster && \
            rm -rf /var/lib/apt/lists/*
        FROM debian:trixie-slim
        RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates && rm -rf /var/lib/apt/lists/*
        COPY --from=build /usr/local/cargo/bin/feroxbuster /usr/local/bin/feroxbuster
        ENTRYPOINT ["feroxbuster"]
    volumes:
      - ./reports/feroxbuster:/output
      - ./wordlists:/wordlists:ro
    entrypoint: ["feroxbuster"]
    command:
      - "--url"
      - "${TARGET:-https://example.com}"
      - "--wordlist"
      - "/wordlists/dirs.txt"
      - "--depth"
      - "3"
      - "--rate-limit"
      - "${RATE_LIMIT:-50}"
      - "--json"
      - "--output"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "--status-codes"
      - "200,201,204,301,302,307,401,403,405,500"
      - "--threads"
      - "10"
      - "--insecure"
    profiles: ["fuzz"]

  # ============================================================
  # 21. Fuzzing — arjun (hidden HTTP parameter discovery)
  # Couvre: CWE-200,915 (mass assignment, hidden params)
  # ============================================================
  arjun:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install --no-cache-dir arjun
        WORKDIR /app
    volumes:
      - ./reports/arjun:/output
    entrypoint: ["arjun"]
    command:
      - "-u"
      - "${TARGET:-https://example.com}"
      - "-oJ"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "--rate-limit"
      - "${RATE_LIMIT:-50}"
      - "-t"
      - "5"

  # ============================================================
  # 22. WAF — wafw00f (WAF fingerprinting)
  # Couvre: Reconnaissance (identify WAF/CDN before testing)
  # ============================================================
  wafw00f:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install --no-cache-dir wafw00f
        WORKDIR /app
    volumes:
      - ./reports/wafw00f:/output
    entrypoint: ["wafw00f"]
    command:
      - "${TARGET:-https://example.com}"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"
      - "-f"
      - "json"
      - "-a"

  # ============================================================
  # 23. WAF — bypass-403 (403 Forbidden bypass techniques)
  # Couvre: CWE-284,863 (access control bypass)
  # ============================================================
  bypass-403:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y --no-install-recommends git curl && \
            git clone --depth 1 https://github.com/iamj0ker/bypass-403.git /opt/bypass-403 && \
            chmod +x /opt/bypass-403/bypass-403.sh && \
            apt-get purge -y git && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*
        WORKDIR /opt/bypass-403
    volumes:
      - ./reports/bypass-403:/output
    entrypoint: ["bash", "/opt/bypass-403/bypass-403.sh"]
    command:
      - "${TARGET:-https://example.com}"
      - "/admin"
    profiles: ["waf"]

  # ============================================================
  # 24. TLS — testssl.sh (SSL/TLS configuration audit)
  # Couvre: CWE-295,319,326,327,328 (TLS misconfig, weak cipher)
  # ============================================================
  testssl:
    <<: *common
    image: drwetter/testssl.sh:latest
    volumes:
      - ./reports/testssl:/output
    entrypoint: ["testssl.sh"]
    command:
      - "--jsonfile=/output/scan-${SCAN_DATE:-latest}.json"
      - "--fast"
      - "--ip=one"
      - "--quiet"
      - "${TARGET:-https://example.com}"

  # ============================================================
  # 25. CORS — CORScanner (CORS misconfiguration detection)
  # Couvre: CWE-942,346 (permissive CORS, origin validation)
  # ============================================================
  corscanner:
    <<: *common
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y --no-install-recommends git && \
            git clone --depth 1 https://github.com/chenjj/CORScanner.git /opt/corscanner && \
            pip install --no-cache-dir -r /opt/corscanner/requirements.txt && \
            apt-get purge -y git && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*
        WORKDIR /opt/corscanner
    volumes:
      - ./reports/corscanner:/output
      - ./reports/subdominator:/targets:ro
    entrypoint: ["python", "/opt/corscanner/cors_scan.py"]
    command:
      - "-i"
      - "/targets/high-value-targets.txt"
      - "-o"
      - "/output/scan-${SCAN_DATE:-latest}.json"

  # ============================================================
  # 26. Network — nmap (port scan + service detection + NSE)
  # Couvre: CWE-16,200,284,319 (exposed services, misconfig)
  # ============================================================
  nmap:
    <<: *common
    image: instrumentisto/nmap:latest
    volumes:
      - ./reports/nmap:/output
    entrypoint: ["nmap"]
    command:
      - "-sV"
      - "-sC"
      - "--top-ports"
      - "1000"
      - "-T3"
      - "-oX"
      - "/output/scan-${SCAN_DATE:-latest}.xml"
      - "-oN"
